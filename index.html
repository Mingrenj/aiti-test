<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AITI 性格测试</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 开始界面 -->
  <div id="start-screen" class="screen">
    <div class="card">
      <p class="intro-text">SBTI卡的不行来做我的AITI吧。</p>
      <button id="start-btn" class="btn-primary">开始测试</button>
    </div>
  </div>
  <!-- 答题界面 -->
  <div id="quiz-screen" class="screen hidden">
    <div class="card">
      <div id="progress">
        第 <span id="question-number">1</span> / <span id="total-questions">48</span> 题
      </div>
      <div id="question-text"></div>
      <div id="options" class="options"></div>
      <div class="navigation">
        <button id="prev-btn" class="btn-secondary">上一题</button>
        <button id="next-btn" class="btn-primary">下一题</button>
      </div>
    </div>
  </div>
  <!-- 结果界面 -->
  <div id="result-screen" class="screen hidden">
    <div class="result-layout">
      <section class="card result-card identity-card">
        <p class="result-kicker">你的人格类型是：</p>
        <h1 id="result-title" class="result-name"></h1>
        <p id="result-name-en" class="result-name-en"></p>
        <div id="result-image-container" class="result-image-container">
          <img id="result-image" src="" alt="角色图片" />
        </div>
        <p id="result-tagline" class="tagline"></p>
      </section>

      <section class="card result-card details-card">
        <div class="details-card-header">
          <div class="details-heading">
            <p class="section-label">你的主类型</p>
            <h2 id="result-detail-title" class="result-detail-title"></h2>
          </div>
          <div class="result-meta">
            <div class="result-badges">
              <p id="result-match" class="meta-pill match-pill"></p>
              <p id="result-score" class="meta-pill score-pill"></p>
            </div>
            <p id="result-completion" class="completion-text"></p>
          </div>
        </div>
        <div class="detail-section description-block">
          <h3 class="detail-subtitle">角色简介</h3>
          <p id="result-description" class="result-description"></p>
        </div>
        <div class="detail-section">
          <h3 class="detail-subtitle">关键词</h3>
          <div id="result-traits" class="traits"></div>
        </div>
        <button id="restart-btn" class="btn-secondary">重新测试</button>
      </section>
    </div>
  </div>
  <script>
    const runtimeScript = document.createElement('script');
    runtimeScript.src = `script.js?v=${Date.now()}`;
    document.body.appendChild(runtimeScript);
  </script>
</body>
</html>
